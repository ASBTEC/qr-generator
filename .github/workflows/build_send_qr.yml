name: Build_and_send_QR

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to encode in the QR'
        required: true
      email:
        description: 'Email where we will send the QR'
        required: true
      logo_file_url:
        description: 'Google Drive file ID of the centre logo image (optional)'
        required: false
        default: ''
      logo_filename:
        description: 'Logo filename with extension, e.g. logo.png (optional)'
        required: false
        default: ''

env:
  GH_ACTIONS_ENV: true
  EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
  EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}

jobs:
  build_and_send_qr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download custom logo
        if: ${{ github.event.inputs.logo_file_url != '' }}
        run: |
          mkdir -p ./logo
          curl -L -o "./logo/${{ github.event.inputs.logo_filename }}" \
            "https://drive.usercontent.google.com/u/1/uc?id=${{ github.event.inputs.logo_file_url }}&export=download"

      - name: Render QR
        run: |
          if [ -n "${{ github.event.inputs.logo_file_url }}" ]; then
            python ./src/main.py "${{ github.event.inputs.url }}" --logo "./logo/${{ github.event.inputs.logo_filename }}"
          else
            python ./src/main.py "${{ github.event.inputs.url }}"
          fi

      - name: Send email
        run: |
          chmod u+x src/send_emails.sh
          ./src/send_emails.sh ${{ github.event.inputs.email }}
